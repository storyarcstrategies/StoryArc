<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StoryArc CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0D0D0D;
      --surface: #161616;
      --text: #FFFFFF;
      --text-secondary: #888888;
      --accent: #EF9F27;
      --border: #2A2A2A;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
    }

    /* ── Layout ── */

    #sidebar {
      width: 220px;
      min-height: 100vh;
      border-right: 1px solid var(--border);
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 32px;
      position: fixed;
      top: 0; left: 0; bottom: 0;
    }

    #main {
      margin-left: 220px;
      flex: 1;
      padding: 48px 52px;
      min-height: 100vh;
    }

    /* ── Sidebar ── */

    .brand {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .brand span { color: var(--accent); }

    nav { display: flex; flex-direction: column; gap: 2px; }

    nav a {
      color: var(--text-secondary);
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.12s, background 0.12s;
    }

    nav a:hover { color: var(--text); background: var(--surface); }
    nav a.active { color: var(--text); background: var(--surface); }

    /* ── Buttons ── */

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 4px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: opacity 0.12s;
      white-space: nowrap;
    }

    .btn:hover { opacity: 0.82; }

    .btn-primary  { background: var(--accent); color: #000; }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost    { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
    .btn-danger   { background: transparent; color: #EF4444; border: 1px solid #3A1A1A; }

    /* ── Page header ── */

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
    }

    .page-title {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 700;
    }

    /* ── Cards ── */

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 24px;
    }

    /* ── Stat cards ── */

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 24px;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-value.neutral { color: var(--text); }
    .stat-value.danger  { color: #EF4444; }

    /* ── Status badges ── */

    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border: 1px solid transparent;
    }

    .s-lead        { color: #888;     border-color: #333; }
    .s-contacted   { color: #6B9EFF; border-color: #1A2A4A; }
    .s-responded   { color: #63E0A0; border-color: #1A3A2A; }
    .s-proposal    { color: #EF9F27; border-color: #3A2A0A; }
    .s-negotiating { color: #C084FC; border-color: #2A1A3A; }
    .s-closed      { color: #63E0A0; border-color: #1A3A2A; background: #0D2A1A; }
    .s-dead        { color: #EF4444; border-color: #3A1A1A; }

    .type-badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    /* ── Table ── */

    .contacts-table {
      width: 100%;
      border-collapse: collapse;
    }

    .contacts-table th {
      text-align: left;
      padding: 10px 16px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    .contacts-table th:hover { color: var(--text); }
    .contacts-table th.sorted { color: var(--accent); }

    .contacts-table td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .contacts-table tr:last-child td { border-bottom: none; }

    .contacts-table tbody tr {
      cursor: pointer;
      transition: background 0.1s;
    }

    .contacts-table tbody tr:hover { background: rgba(255,255,255,0.025); }

    .contact-name    { font-weight: 500; }
    .contact-company { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

    /* ── Dashboard bottom grid ── */

    .dash-bottom {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .section-heading {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* ── Status breakdown ── */

    .status-list { display: flex; flex-direction: column; gap: 12px; }

    .status-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-row .badge { min-width: 110px; text-align: center; }

    .bar-wrap {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
    }

    .bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s;
    }

    .bar-count {
      font-size: 12px;
      color: var(--text-secondary);
      min-width: 18px;
      text-align: right;
    }

    /* ── Overdue list ── */

    .overdue-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .overdue-item:last-child { border-bottom: none; }

    .overdue-name {
      font-weight: 500;
      font-size: 13px;
      cursor: pointer;
    }

    .overdue-name:hover { color: var(--accent); }
    .overdue-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .overdue-date { font-size: 12px; color: #EF4444; }

    /* ── Contact detail ── */

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 28px;
    }

    .back-link:hover { color: var(--text); }

    .detail-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 40px;
      gap: 24px;
    }

    .detail-name {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .detail-meta { color: var(--text-secondary); font-size: 14px; }

    .detail-badges { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 12px; }

    .detail-actions { display: flex; gap: 8px; flex-shrink: 0; }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 24px 32px;
      margin-bottom: 40px;
    }

    .detail-field { display: flex; flex-direction: column; gap: 5px; }

    .detail-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .detail-value { font-size: 14px; }
    .detail-value a { color: inherit; text-decoration: none; }
    .detail-value a:hover { color: var(--accent); }

    /* ── Notes ── */

    .notes-block {
      margin-bottom: 40px;
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    .notes-text {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    /* ── Touchpoints ── */

    .tp-item {
      display: flex;
      gap: 20px;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
    }

    .tp-item:last-child { border-bottom: none; }

    .tp-date    { font-size: 12px; color: var(--text-secondary); min-width: 90px; padding-top: 1px; }
    .tp-channel { font-size: 11px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.04em; min-width: 72px; padding-top: 1px; }
    .tp-summary { font-size: 14px; flex: 1; }

    /* ── Modal ── */

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 24px;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 580px;
      max-width: 100%;
      max-height: 88vh;
      overflow-y: auto;
      padding: 32px;
    }

    .modal-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 28px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }

    label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    input, select, textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      padding: 8px 12px;
      width: 100%;
      outline: none;
      transition: border-color 0.12s;
      -webkit-appearance: none;
    }

    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    select option { background: #1A1A1A; }
    textarea { resize: vertical; min-height: 80px; }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 28px;
    }

    /* ── Utility ── */

    .overdue-text { color: #EF4444; }
    .accent-text  { color: var(--accent); }
    .muted        { color: var(--text-secondary); }

    .empty-state {
      text-align: center;
      padding: 64px 0;
      color: var(--text-secondary);
      font-size: 13px;
    }
  </style>
</head>
<body>

<div id="sidebar">
  <div class="brand">StoryArc<span>.</span></div>
  <nav>
    <a id="nav-dashboard" onclick="go('dashboard')">Dashboard</a>
    <a id="nav-contacts"  onclick="go('contacts')">Contacts</a>
  </nav>
</div>

<div id="main"></div>
<div id="modal-root"></div>

<script>
// ─────────────────────────────────────────────
// STORAGE
// ─────────────────────────────────────────────

const K_CONTACTS    = 'storyarc_contacts';
const K_TOUCHPOINTS = 'storyarc_touchpoints';

const uid = () =>
  typeof crypto !== 'undefined' && crypto.randomUUID
    ? crypto.randomUUID()
    : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
      });

const loadContacts    = () => JSON.parse(localStorage.getItem(K_CONTACTS)    || '[]');
const loadTouchpoints = () => JSON.parse(localStorage.getItem(K_TOUCHPOINTS) || '[]');
const saveContacts    = a  => localStorage.setItem(K_CONTACTS,    JSON.stringify(a));
const saveTouchpoints = a  => localStorage.setItem(K_TOUCHPOINTS, JSON.stringify(a));

function createContact(data) {
  const now = new Date().toISOString();
  const c   = { id: uid(), ...data, createdAt: now, updatedAt: now };
  const arr = loadContacts();
  arr.push(c);
  saveContacts(arr);
  return c;
}

function patchContact(id, data) {
  const arr = loadContacts();
  const i   = arr.findIndex(c => c.id === id);
  if (i === -1) return;
  arr[i] = { ...arr[i], ...data, updatedAt: new Date().toISOString() };
  saveContacts(arr);
  return arr[i];
}

function removeContact(id) {
  saveContacts(loadContacts().filter(c => c.id !== id));
  saveTouchpoints(loadTouchpoints().filter(t => t.contactId !== id));
}

function createTouchpoint(data) {
  const all = loadTouchpoints();
  const tp  = { id: uid(), ...data };
  all.push(tp);
  saveTouchpoints(all);

  // Auto-update lastContactDate to the most recent touchpoint date for this contact
  const latest = all
    .filter(t => t.contactId === data.contactId)
    .map(t => t.date)
    .sort()
    .pop();
  if (latest) patchContact(data.contactId, { lastContactDate: latest });

  return tp;
}

function contactTouchpoints(contactId) {
  return loadTouchpoints()
    .filter(t => t.contactId === contactId)
    .sort((a, b) => b.date.localeCompare(a.date));
}

// ─────────────────────────────────────────────
// SEED
// ─────────────────────────────────────────────

function seedIfEmpty() {
  if (loadContacts().length > 0) return;
  const now = new Date().toISOString();
  saveContacts([
    {
      id: uid(), name: 'Pete Rizzo', company: '', role: '',
      email: 'peterizzowrites@gmail.com', phone: '',
      source: 'Past client', type: 'Warm', status: 'Contacted',
      lastContactDate: '2026-05-20', nextFollowUpDate: '',
      notes: '', dealValue: null, serviceInterest: 'TBD',
      createdAt: now, updatedAt: now,
    },
    {
      id: uid(), name: 'Silvia', company: 'Render Network Foundation', role: '',
      email: 'silvia@renderfoundation.com', phone: '',
      source: 'Past client', type: 'Warm', status: 'Contacted',
      lastContactDate: '2026-05-20', nextFollowUpDate: '',
      notes: '', dealValue: null, serviceInterest: 'TBD',
      createdAt: now, updatedAt: now,
    },
  ]);
}

// ─────────────────────────────────────────────
// ROUTING
// ─────────────────────────────────────────────

let view      = 'dashboard';
let activeId  = null;
let sortField = 'lastContactDate';
let sortDir   = 'desc';

function go(v, id = null) {
  view     = v;
  activeId = id;
  document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
  const nav = document.getElementById(`nav-${v === 'contact' ? 'contacts' : v}`);
  if (nav) nav.classList.add('active');
  render();
}

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────

const STATUS_ORDER = ['Lead','Contacted','Responded','Proposal Sent','Negotiating','Closed','Dead'];

const STATUS_CLASS = {
  'Lead':          's-lead',
  'Contacted':     's-contacted',
  'Responded':     's-responded',
  'Proposal Sent': 's-proposal',
  'Negotiating':   's-negotiating',
  'Closed':        's-closed',
  'Dead':          's-dead',
};

function fmtDate(d) {
  if (!d) return '—';
  const [y, m, day] = d.split('-');
  const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${mo[+m - 1]} ${+day}, ${y}`;
}

function todayISO() {
  return new Date().toISOString().split('T')[0];
}

function isOverdue(d) {
  return !!d && d < todayISO();
}

function fmtUSD(v) {
  if (v === null || v === undefined || v === '') return '—';
  return '$' + Number(v).toLocaleString();
}

function sortedContacts(contacts) {
  return [...contacts].sort((a, b) => {
    let av = a[sortField] ?? '';
    let bv = b[sortField] ?? '';
    if (sortField === 'dealValue') { av = +av || 0; bv = +bv || 0; }
    if (sortField === 'status')    { av = STATUS_ORDER.indexOf(av); bv = STATUS_ORDER.indexOf(bv); }
    if (av < bv) return sortDir === 'asc' ? -1 : 1;
    if (av > bv) return sortDir === 'asc' ?  1 : -1;
    return 0;
  });
}

function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ─────────────────────────────────────────────
// RENDER ROUTER
// ─────────────────────────────────────────────

function render() {
  document.getElementById('main').innerHTML =
    view === 'dashboard' ? renderDashboard() :
    view === 'contacts'  ? renderContacts()  :
    view === 'contact'   ? renderContact()   : '';
}

// ─────────────────────────────────────────────
// DASHBOARD
// ─────────────────────────────────────────────

function renderDashboard() {
  const contacts = loadContacts();

  const openPipeline = contacts
    .filter(c => !['Closed','Dead'].includes(c.status))
    .reduce((s, c) => s + (+c.dealValue || 0), 0);

  const wonRevenue = contacts
    .filter(c => c.status === 'Closed')
    .reduce((s, c) => s + (+c.dealValue || 0), 0);

  const overdue = contacts.filter(c =>
    isOverdue(c.nextFollowUpDate) && !['Closed','Dead'].includes(c.status)
  );

  const counts = {};
  STATUS_ORDER.forEach(s => counts[s] = 0);
  contacts.forEach(c => { if (counts[c.status] !== undefined) counts[c.status]++; });
  const maxCount = Math.max(...Object.values(counts), 1);

  const statusRows = STATUS_ORDER.map(s => `
    <div class="status-row">
      <span class="badge ${STATUS_CLASS[s]}">${esc(s)}</span>
      <div class="bar-wrap"><div class="bar-fill" style="width:${(counts[s]/maxCount)*100}%"></div></div>
      <span class="bar-count">${counts[s]}</span>
    </div>
  `).join('');

  const overdueHtml = overdue.length === 0
    ? '<p class="muted" style="font-size:13px">No overdue follow-ups.</p>'
    : overdue
        .sort((a,b) => a.nextFollowUpDate.localeCompare(b.nextFollowUpDate))
        .map(c => `
          <div class="overdue-item">
            <div>
              <div class="overdue-name" onclick="go('contact','${c.id}')">${esc(c.name)}</div>
              <div class="overdue-sub">${esc(c.company)}</div>
            </div>
            <div class="overdue-date">${fmtDate(c.nextFollowUpDate)}</div>
          </div>
        `).join('');

  return `
    <div class="page-header">
      <h1 class="page-title">Dashboard</h1>
      <button class="btn btn-primary" onclick="openContactForm(null)">+ Add Contact</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Open Pipeline</div>
        <div class="stat-value">${fmtUSD(openPipeline)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Won Revenue</div>
        <div class="stat-value">${fmtUSD(wonRevenue)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Contacts</div>
        <div class="stat-value neutral">${contacts.length}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Overdue Follow-ups</div>
        <div class="stat-value ${overdue.length > 0 ? 'danger' : 'neutral'}">${overdue.length}</div>
      </div>
    </div>

    <div class="dash-bottom">
      <div class="card">
        <div class="section-heading"><span>Pipeline by Status</span></div>
        <div class="status-list">${statusRows}</div>
      </div>
      <div class="card">
        <div class="section-heading"><span>Overdue Follow-ups</span></div>
        ${overdueHtml}
      </div>
    </div>
  `;
}

// ─────────────────────────────────────────────
// CONTACTS LIST
// ─────────────────────────────────────────────

function renderContacts() {
  const contacts = sortedContacts(loadContacts());

  function th(label, field) {
    const active = sortField === field;
    const arrow  = active ? (sortDir === 'asc' ? ' ↑' : ' ↓') : '';
    return `<th class="${active ? 'sorted' : ''}" onclick="setSort('${field}')">${label}${arrow}</th>`;
  }

  const rows = contacts.length === 0
    ? `<tr><td colspan="7" style="text-align:center;padding:56px;color:var(--text-secondary)">No contacts yet.</td></tr>`
    : contacts.map(c => {
        const fu = c.nextFollowUpDate
          ? `<span class="${isOverdue(c.nextFollowUpDate) ? 'overdue-text' : ''}">${fmtDate(c.nextFollowUpDate)}</span>`
          : '—';
        return `
          <tr onclick="go('contact','${c.id}')">
            <td>
              <div class="contact-name">${esc(c.name)}</div>
              <div class="contact-company">${esc(c.company)}</div>
            </td>
            <td><span class="badge ${STATUS_CLASS[c.status]}">${esc(c.status)}</span></td>
            <td><span class="type-badge">${esc(c.type)}</span></td>
            <td class="muted" style="font-size:13px">${fmtDate(c.lastContactDate)}</td>
            <td style="font-size:13px">${fu}</td>
            <td class="accent-text" style="font-size:13px">${fmtUSD(c.dealValue)}</td>
            <td class="muted" style="font-size:12px">${esc(c.serviceInterest || '—')}</td>
          </tr>
        `;
      }).join('');

  return `
    <div class="page-header">
      <h1 class="page-title">Contacts</h1>
      <button class="btn btn-primary" onclick="openContactForm(null)">+ Add Contact</button>
    </div>

    <div class="card" style="padding:0;overflow:hidden">
      <table class="contacts-table">
        <thead>
          <tr>
            ${th('Name', 'name')}
            ${th('Status', 'status')}
            ${th('Type', 'type')}
            ${th('Last Contact', 'lastContactDate')}
            ${th('Follow-up', 'nextFollowUpDate')}
            ${th('Deal Value', 'dealValue')}
            <th>Service</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function setSort(field) {
  if (sortField === field) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  else { sortField = field; sortDir = 'asc'; }
  render();
}

// ─────────────────────────────────────────────
// CONTACT DETAIL
// ─────────────────────────────────────────────

function renderContact() {
  const c = loadContacts().find(x => x.id === activeId);
  if (!c) { go('contacts'); return ''; }

  const tps = contactTouchpoints(c.id);

  const tpHtml = tps.length === 0
    ? '<p class="muted" style="font-size:13px;padding:16px 0">No touchpoints logged yet.</p>'
    : tps.map(tp => `
        <div class="tp-item">
          <div class="tp-date">${fmtDate(tp.date)}</div>
          <div class="tp-channel">${esc(tp.channel)}</div>
          <div class="tp-summary">${esc(tp.summary) || '<span class="muted">—</span>'}</div>
        </div>
      `).join('');

  const fuLabel = c.nextFollowUpDate
    ? `<span class="${isOverdue(c.nextFollowUpDate) ? 'overdue-text' : ''}">${fmtDate(c.nextFollowUpDate)}</span>`
    : '—';

  const svcBadge = c.serviceInterest
    ? `<span class="badge" style="color:var(--accent);border-color:#3A2A0A">${esc(c.serviceInterest)}</span>`
    : '';

  return `
    <div class="back-link" onclick="go('contacts')">← Contacts</div>

    <div class="detail-header">
      <div>
        <h1 class="detail-name">${esc(c.name)}</h1>
        <div class="detail-meta">${[c.role, c.company].filter(Boolean).map(esc).join(' · ') || '&nbsp;'}</div>
        <div class="detail-badges">
          <span class="badge ${STATUS_CLASS[c.status]}">${esc(c.status)}</span>
          <span class="type-badge">${esc(c.type)}</span>
          ${svcBadge}
        </div>
      </div>
      <div class="detail-actions">
        <button class="btn btn-ghost"      onclick="openTouchpointForm('${c.id}')">Log Touchpoint</button>
        <button class="btn btn-secondary"  onclick="openContactForm('${c.id}')">Edit</button>
        <button class="btn btn-danger"     onclick="confirmDelete('${c.id}')">Delete</button>
      </div>
    </div>

    <div class="detail-grid">
      <div class="detail-field">
        <span class="detail-label">Email</span>
        <span class="detail-value">${c.email ? `<a href="mailto:${esc(c.email)}">${esc(c.email)}</a>` : '—'}</span>
      </div>
      <div class="detail-field">
        <span class="detail-label">Phone</span>
        <span class="detail-value">${esc(c.phone) || '—'}</span>
      </div>
      <div class="detail-field">
        <span class="detail-label">Source</span>
        <span class="detail-value">${esc(c.source) || '—'}</span>
      </div>
      <div class="detail-field">
        <span class="detail-label">Deal Value</span>
        <span class="detail-value accent-text">${fmtUSD(c.dealValue)}</span>
      </div>
      <div class="detail-field">
        <span class="detail-label">Last Contact</span>
        <span class="detail-value">${fmtDate(c.lastContactDate)}</span>
      </div>
      <div class="detail-field">
        <span class="detail-label">Next Follow-up</span>
        <span class="detail-value">${fuLabel}</span>
      </div>
    </div>

    <div class="section-heading" style="margin-bottom:16px">Notes</div>
    <div class="notes-block" style="margin-bottom:40px">
      <div class="notes-text">${c.notes ? esc(c.notes) : '<span class="muted">No notes.</span>'}</div>
    </div>

    <div class="section-heading">
      <span>Touchpoints</span>
      <button class="btn btn-ghost" style="font-size:12px;padding:5px 12px" onclick="openTouchpointForm('${c.id}')">+ Log</button>
    </div>
    <div>${tpHtml}</div>
  `;
}

// ─────────────────────────────────────────────
// MODAL HELPERS
// ─────────────────────────────────────────────

function showModal(html) {
  document.getElementById('modal-root').innerHTML =
    `<div class="modal-overlay" onclick="handleOverlayClick(event)">${html}</div>`;
}

function closeModal() {
  document.getElementById('modal-root').innerHTML = '';
}

function handleOverlayClick(e) {
  if (e.target.classList.contains('modal-overlay')) closeModal();
}

// ─────────────────────────────────────────────
// ADD / EDIT CONTACT MODAL
// ─────────────────────────────────────────────

function openContactForm(id) {
  const c    = id ? loadContacts().find(x => x.id === id) : null;
  const isEdit = !!c;
  const v    = (f, def = '') => esc(c ? (c[f] ?? def) : def);

  const optStatus  = ['Lead','Contacted','Responded','Proposal Sent','Negotiating','Closed','Dead'];
  const optType    = ['Warm','Cold','Referral'];
  const optService = ['Content Function Build','Growth Content Retainer','GTM Sprint','TBD'];

  const sel = (opts, field, def = '') =>
    opts.map(o => `<option value="${esc(o)}" ${(c ? c[field] : def) === o ? 'selected' : ''}>${esc(o)}</option>`).join('');

  showModal(`
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">${isEdit ? 'Edit Contact' : 'Add Contact'}</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Name *</label>
          <input id="f-name" value="${v('name')}" placeholder="Full name">
        </div>
        <div class="form-group">
          <label>Company</label>
          <input id="f-company" value="${v('company')}" placeholder="Company">
        </div>
        <div class="form-group">
          <label>Role</label>
          <input id="f-role" value="${v('role')}" placeholder="Title / role">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input id="f-email" type="email" value="${v('email')}" placeholder="email@example.com">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input id="f-phone" value="${v('phone')}" placeholder="+1 555 000 0000">
        </div>
        <div class="form-group">
          <label>Source</label>
          <input id="f-source" value="${v('source')}" placeholder="How do you know them?">
        </div>
        <div class="form-group">
          <label>Type</label>
          <select id="f-type">${sel(optType, 'type', 'Warm')}</select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="f-status">${sel(optStatus, 'status', 'Lead')}</select>
        </div>
        <div class="form-group">
          <label>Service Interest</label>
          <select id="f-service">${sel(optService, 'serviceInterest', 'TBD')}</select>
        </div>
        <div class="form-group">
          <label>Deal Value (USD)</label>
          <input id="f-deal" type="number" value="${c && c.dealValue !== null ? c.dealValue : ''}" placeholder="0">
        </div>
        ${!isEdit ? `
        <div class="form-group">
          <label>Last Contact Date</label>
          <input id="f-lastcontact" type="date" value="${v('lastContactDate', todayISO())}">
        </div>` : ''}
        <div class="form-group ${!isEdit ? '' : 'full'}" style="${!isEdit ? '' : ''}">
          <label>Next Follow-up</label>
          <input id="f-followup" type="date" value="${v('nextFollowUpDate')}">
        </div>
        <div class="form-group full">
          <label>Notes</label>
          <textarea id="f-notes" rows="3" placeholder="Persistent context, background, anything relevant...">${c ? esc(c.notes) : ''}</textarea>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="submitContactForm(${isEdit ? `'${id}'` : 'null'})">
          ${isEdit ? 'Save Changes' : 'Add Contact'}
        </button>
      </div>
    </div>
  `);
}

function submitContactForm(id) {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Name is required.'); return; }

  const data = {
    name,
    company:         document.getElementById('f-company').value.trim(),
    role:            document.getElementById('f-role').value.trim(),
    email:           document.getElementById('f-email').value.trim(),
    phone:           document.getElementById('f-phone').value.trim(),
    source:          document.getElementById('f-source').value.trim(),
    type:            document.getElementById('f-type').value,
    status:          document.getElementById('f-status').value,
    serviceInterest: document.getElementById('f-service').value,
    dealValue:       document.getElementById('f-deal').value !== ''
                       ? parseFloat(document.getElementById('f-deal').value)
                       : null,
    nextFollowUpDate: document.getElementById('f-followup').value || '',
    notes:           document.getElementById('f-notes').value.trim(),
  };

  if (!id) {
    const lc = document.getElementById('f-lastcontact');
    data.lastContactDate = lc ? lc.value || todayISO() : todayISO();
    createContact(data);
  } else {
    patchContact(id, data);
  }

  closeModal();
  render();
}

// ─────────────────────────────────────────────
// LOG TOUCHPOINT MODAL
// ─────────────────────────────────────────────

function openTouchpointForm(contactId) {
  const channels = ['Email','Call','LinkedIn','Meeting','Text','Other'];
  const chOpts   = channels.map(ch => `<option value="${ch}">${ch}</option>`).join('');

  showModal(`
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">Log Touchpoint</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Date *</label>
          <input id="tp-date" type="date" value="${todayISO()}">
        </div>
        <div class="form-group">
          <label>Channel *</label>
          <select id="tp-channel">${chOpts}</select>
        </div>
        <div class="form-group full">
          <label>Summary</label>
          <textarea id="tp-summary" rows="4" placeholder="What happened? Key takeaways, next steps…"></textarea>
        </div>
        <div class="form-group full">
          <label>Set Next Follow-up (optional)</label>
          <input id="tp-followup" type="date">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="submitTouchpoint('${contactId}')">Log</button>
      </div>
    </div>
  `);
}

function submitTouchpoint(contactId) {
  const date = document.getElementById('tp-date').value;
  if (!date) { alert('Date is required.'); return; }

  createTouchpoint({
    contactId,
    date,
    channel: document.getElementById('tp-channel').value,
    summary: document.getElementById('tp-summary').value.trim(),
  });

  const fu = document.getElementById('tp-followup').value;
  if (fu) patchContact(contactId, { nextFollowUpDate: fu });

  closeModal();
  render();
}

// ─────────────────────────────────────────────
// DELETE
// ─────────────────────────────────────────────

function confirmDelete(id) {
  const c = loadContacts().find(x => x.id === id);
  showModal(`
    <div class="modal" onclick="event.stopPropagation()" style="max-width:400px">
      <div class="modal-title">Delete Contact</div>
      <p class="muted" style="margin-bottom:24px;line-height:1.6">
        Permanently delete <strong style="color:var(--text)">${esc(c.name)}</strong> and all their touchpoints?
        This cannot be undone.
      </p>
      <div class="form-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-danger" onclick="doDelete('${id}')">Delete</button>
      </div>
    </div>
  `);
}

function doDelete(id) {
  removeContact(id);
  closeModal();
  go('contacts');
}

// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────

seedIfEmpty();
go('dashboard');
</script>
</body>
</html>
